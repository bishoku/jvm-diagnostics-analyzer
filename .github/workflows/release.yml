name: Release — Build Native Installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            jpackage-type: deb
            artifact-name: jvm-diagnostics-linux
            artifact-ext: deb
          - os: windows-latest
            jpackage-type: exe
            artifact-name: jvm-diagnostics-windows
            artifact-ext: exe

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Fat JAR
        run: mvn clean package -DskipTests -B

      - name: Get project version
        id: version
        shell: bash
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"

      - name: Find JAR file
        id: jar
        shell: bash
        run: |
          JAR=$(ls target/jvm-diagnostics-analyzer-*.jar | head -1)
          echo "jar=$JAR" >> $GITHUB_OUTPUT
          echo "JAR: $JAR"

      - name: Create jpackage input directory
        shell: bash
        run: |
          mkdir -p jpackage-input
          cp ${{ steps.jar.outputs.jar }} jpackage-input/

      - name: Build Native Installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          jpackage \
            --input jpackage-input \
            --main-jar $(basename ${{ steps.jar.outputs.jar }}) \
            --name "JVM Diagnostics" \
            --app-version "${{ steps.version.outputs.version }}" \
            --vendor "bishokudev" \
            --description "AI-powered JVM diagnostics analyzer" \
            --type ${{ matrix.jpackage-type }} \
            --java-options "-Xms256m" \
            --java-options "-Xmx2g" \
            --java-options "-Dapp.browser.auto-open=true" \
            --linux-shortcut \
            --linux-menu-group "Development" \
            --dest target/installer

      - name: Build Native Installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          jpackage \
            --input jpackage-input \
            --main-jar $(basename ${{ steps.jar.outputs.jar }}) \
            --name "JVM Diagnostics" \
            --app-version "${{ steps.version.outputs.version }}" \
            --vendor "bishokudev" \
            --description "AI-powered JVM diagnostics analyzer" \
            --type ${{ matrix.jpackage-type }} \
            --java-options "-Xms256m" \
            --java-options "-Xmx2g" \
            --java-options "-Dapp.browser.auto-open=true" \
            --win-shortcut \
            --win-menu \
            --win-menu-group "JVM Diagnostics" \
            --dest target/installer

      - name: Find installer file
        id: installer
        shell: bash
        run: |
          INSTALLER=$(ls target/installer/*.* | head -1)
          echo "path=$INSTALLER" >> $GITHUB_OUTPUT
          echo "name=$(basename $INSTALLER)" >> $GITHUB_OUTPUT
          echo "Installer: $INSTALLER"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ steps.installer.outputs.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
