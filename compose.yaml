services:
  jvm-diagnostics:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      # Required
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # AI Configuration (optional — defaults shown)
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api}
      - AI_MODEL=${AI_MODEL:-openai/gpt-4o}
      - AI_TEMPERATURE=${AI_TEMPERATURE:-0.3}

      # Upload limits (optional)
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-5GB}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-5GB}
      - FILE_SIZE_THRESHOLD=${FILE_SIZE_THRESHOLD:-10MB}

      # Storage & MAT (optional — Docker defaults are fine)
      - APP_STORAGE_LOCATION=/data/uploads
      - APP_MAT_HOME=/opt/mat
      - MAT_HEAP_SIZE=${MAT_HEAP_SIZE}
      - DYNAMIC_MAX_MAT_MEMORY=${DYNAMIC_MAX_MAT_MEMORY:-8g}
      - APP_MAT_TIMEOUT_MINUTES=${APP_MAT_TIMEOUT_MINUTES:-30}

      # JVM tuning (optional)
      - JAVA_OPTS=${JAVA_OPTS:--Xms512m -Xmx2g}

      # MCP Server (optional)
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - MCP_SESSION_TIMEOUT=${MCP_SESSION_TIMEOUT:-120}

      # Desktop features (disabled in Docker)
      - APP_BROWSER_AUTO_OPEN=false
    volumes:
      - upload-data:/data/uploads
    restart: unless-stopped

volumes:
  upload-data:
